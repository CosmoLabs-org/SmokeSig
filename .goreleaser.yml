version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/CosmoLabs-org/cosmo-smoke/cmd.Version={{.Version}}
    binary: smoke

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- tolower .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: CosmoLabs-org
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/CosmoLabs-org/cosmo-smoke"
    description: "Universal smoke test runner — does it turn on?"
    test: |
      system "#{bin}/smoke version"
    install: |
      bin.install "smoke"

dockers:
  - dockerfile: Dockerfile
    build_templates:
      - "Dockerfile"
    image_templates:
      - "cosmolabs/cosmo-smoke:{{ .Version }}"
      - "cosmolabs/cosmo-smoke:latest"
    goos: linux
    goarch: amd64
  - dockerfile: Dockerfile
    image_templates:
      - "cosmolabs/cosmo-smoke:{{ .Version }}-arm64"
      - "cosmolabs/cosmo-smoke:latest-arm64"
    goos: linux
    goarch: arm64

release:
  github:
    owner: CosmoLabs-org
    name: cosmo-smoke
  prerelease: auto
