title: Docker Compose --compose-file flag silently ignored (append no-op)
description: assertion_docker.go:65 uses append([]string{...}) with no values — a no-op confirmed by go vet. The custom compose file path is never applied to the args slice.
fix_direction: Change args = append([]string{compose, -f, check.ComposeFile, ps, --format, json}) to args = []string{compose, -f, check.ComposeFile, ps, --format, json} at assertion_docker.go:65. Add test in assertion_test.go verifying ComposeFile is passed to docker.
