title: IPv6 address formatting broken across 8 assertion types
description: fmt.Sprintf percent-s colon percent-d produces ::1:5432 for IPv6 — net.Dial requires [::1]:5432. Affects Redis, Postgres, MySQL, Memcached, LDAP, MongoDB, port_listening, SMTP. Confirmed by go vet.
fix_direction: Replace fmt.Sprintf with net.JoinHostPort(host, strconv.Itoa(port)) in internal/runner/assertion_db.go (4 instances), internal/runner/assertion_ldap.go, internal/runner/assertion_mongo.go, internal/runner/assertion_network.go, internal/runner/assertion_smtp.go.
