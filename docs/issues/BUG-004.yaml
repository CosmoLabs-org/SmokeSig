title: SMTP double-handshake causes protocol desync
description: assertion_smtp.go:38-62 manually reads the SMTP 220 greeting, then creates smtp.NewClient which internally reads the greeting again. Protocol desync.
fix_direction: Remove manual greeting read in internal/runner/assertion_smtp.go lines 38-56 and let smtp.NewClient handle the 220 greeting. Add TestCheckSMTP_Handshake in assertion_dns_smtp_test.go to verify single greeting consumption.
