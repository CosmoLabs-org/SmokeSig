    - TestNewProvider_GCP: verify returns gcpOIDCProvider
    - TestNewProvider_Azure: verify returns azureOIDCProvider
    - TestNewProvider_Unknown: verify returns error
    - TestResolveAll_NoCIToken: no CI env vars, returns nil gracefully
    - TestResolveAll_MultiProvider: set SMOKESIG_OIDC_TOKEN, mock 2 providers via httptest, verify merged env vars
    - TestResolveAll_PartialFailure: one provider's mock returns error, other succeeds, verify partial result returned with no error

