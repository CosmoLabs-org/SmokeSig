- task: |
    Create internal/auth/ci.go with CI environment auto-detection.

    Package: auth

    Exported function:
      func DetectCIToken() (token string, provider string, err error)

    Detection order:
    1. GitHub Actions: check ACTIONS_ID_TOKEN_REQUEST_URL and ACTIONS_ID_TOKEN_REQUEST_TOKEN env vars.
       If both set, POST to ACTIONS_ID_TOKEN_REQUEST_URL with Authorization: bearer <REQUEST_TOKEN>
       and query param audience=smokesig. Parse JSON response field "value" as the token.
       Return (token, "github", nil).
    2. GitLab CI: check CI_JOB_JWT_V2 env var. If set, return (value, "gitlab", nil).
    3. Explicit: check SMOKESIG_OIDC_TOKEN env var. If set, return (value, "explicit", nil).
    4. None found: return ("", "", nil) — no error, just empty.

    Create internal/auth/ci_test.go with tests:
    - TestDetectCIToken_GitHubActions: set env vars, start httptest server, verify token returned
    - TestDetectCIToken_GitLabCI: set CI_JOB_JWT_V2, verify returned
    - TestDetectCIToken_Explicit: set SMOKESIG_OIDC_TOKEN, verify returned
    - TestDetectCIToken_NoCI: no env vars, verify empty string returned with no error
    - TestDetectCIToken_GitHubPriority: set both GitHub and GitLab vars, verify GitHub wins

    Verify:
      go test ./internal/auth/ -run TestDetectCIToken -v
      go build ./...

    Commit: ccs commit -m "feat(auth): CI environment auto-detection for GitHub Actions and GitLab CI (FEAT-049)"
  files:
    - internal/auth/ci.go
    - internal/auth/ci_test.go
  max_turns: 25
  verify: "go test ./internal/auth/ -run TestDetectCIToken -v && go build ./..."

