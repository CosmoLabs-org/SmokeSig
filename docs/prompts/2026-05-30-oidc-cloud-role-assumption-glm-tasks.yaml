    Resolve implementation:
    - Default stsURL to "https://sts.amazonaws.com" if empty
    - Default Region to "us-east-1" if empty
    - Default SessionName to "smokesig" if empty
    - POST to stsURL with query params: Action=AssumeRoleWithWebIdentity,
      RoleArn=<role_arn>, RoleSessionName=<session_name>,
      WebIdentityToken=<oidc_token>, Version=2011-06-15
    - Parse XML response using encoding/xml. The response structure:
      <AssumeRoleWithWebIdentityResponse>
        <AssumeRoleWithWebIdentityResult>
          <Credentials>
            <AccessKeyId>...</AccessKeyId>
            <SecretAccessKey>...</SecretAccessKey>
            <SessionToken>...</SessionToken>
          </Credentials>
        </AssumeRoleWithWebIdentityResult>
      </AssumeRoleWithWebIdentityResponse>
    - Return map: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION

