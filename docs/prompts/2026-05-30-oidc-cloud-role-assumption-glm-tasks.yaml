    - TestAWSResolve_STSError: mock returns 403, verify error
    - TestAWSResolve_InvalidXML: mock returns garbage, verify error
    - TestAWSResolve_DefaultRegion: empty region defaults to us-east-1
    - TestAWSResolve_DefaultSessionName: empty session defaults to "smokesig"

    Verify:
