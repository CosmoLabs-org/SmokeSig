- task: |
    Create internal/auth/gcp.go with GCP Workload Identity Federation exchange.

    Package: auth

    Types and functions:
      type gcpOIDCProvider struct {
          ProjectNumber  string
          PoolID         string
          ProviderID     string
          ServiceAccount string
          stsURL         string // for testing, defaults to https://sts.googleapis.com
          iamURL         string // for testing, defaults to https://iamcredentials.googleapis.com
          tempDir        string // for temp creds file, defaults to os.TempDir()
      }

      func (p *gcpOIDCProvider) Type() string { return "gcp_oidc" }
      func (p *gcpOIDCProvider) Resolve(ctx context.Context, oidcToken string) (map[string]string, error)

    The AuthProvider interface (same as in aws.go):
      type AuthProvider interface {
          Type() string
          Resolve(ctx context.Context, oidcToken string) (map[string]string, error)
      }
    Define it here too (will be deduplicated later in auth.go).

    Resolve implementation — two HTTP steps:

    Step 1: POST to {stsURL}/v1/token with form-encoded body:
      grant_type=urn:ietf:params:oauth:grant-type:token-exchange
      subject_token=<oidc_token>
      subject_token_type=urn:ietf:params:oauth:token-type:jwt
      audience=//iam.googleapis.com/projects/<project_number>/locations/global/workloadIdentityPools/<pool_id>/providers/<provider_id>
      requested_token_type=urn:ietf:params:oauth:token-type:access_token
      scope=https://www.googleapis.com/auth/cloud-platform
    Parse JSON response: {"access_token": "..."}

    Step 2: POST to {iamURL}/v1/projects/-/serviceAccounts/<service_account>:generateAccessToken
      Authorization: Bearer <step1_access_token>
      Content-Type: application/json
      Body: {"scope": ["https://www.googleapis.com/auth/cloud-platform"]}
    Parse JSON response: {"accessToken": "...", "expireTime": "..."}

    Write a temp JSON file to tempDir with the access token for GOOGLE_APPLICATION_CREDENTIALS.
    The file format: {"type": "authorized_user", "token": "<step2_token>"}

    Return map: GOOGLE_APPLICATION_CREDENTIALS=<temp_file_path>, CLOUDSDK_CORE_PROJECT=<project_number>

    Create internal/auth/gcp_test.go with tests using httptest:
    - TestGCPResolve_Success: both steps succeed, verify env vars and temp file
    - TestGCPResolve_STSFails: step 1 returns error, verify error propagated
    - TestGCPResolve_IAMFails: step 1 succeeds, step 2 fails, verify error
    - TestGCPResolve_CredsFileWritten: verify temp JSON file exists with correct content

    Verify:
      go test ./internal/auth/ -run TestGCP -v
      go build ./...

    Commit: ccs commit -m "feat(auth): GCP Workload Identity Federation exchange (FEAT-049)"
  files:
    - internal/auth/gcp.go
    - internal/auth/gcp_test.go
  max_turns: 25
  verify: "go test ./internal/auth/ -run TestGCP -v && go build ./..."

