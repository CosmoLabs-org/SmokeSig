    Exported symbols:

      type AuthProvider interface {
          Type() string
          Resolve(ctx context.Context, oidcToken string) (map[string]string, error)
      }

      func NewProvider(cfg schema.AuthProviderConfig) (AuthProvider, error)

    NewProvider creates the right provider based on cfg.Type:
    - "aws_oidc" -> &awsOIDCProvider{RoleARN: cfg.RoleARN, Region: cfg.Region, SessionName: cfg.SessionName}
    - "gcp_oidc" -> &gcpOIDCProvider{ProjectNumber: cfg.ProjectNumber, PoolID: cfg.PoolID, ProviderID: cfg.ProviderID, ServiceAccount: cfg.ServiceAccount}
    - "azure_oidc" -> &azureOIDCProvider{TenantID: cfg.TenantID, ClientID: cfg.ClientID, SubscriptionID: cfg.SubscriptionID}
    - unknown -> return error

      func ResolveAll(ctx context.Context, providers []schema.AuthProviderConfig) (map[string]string, error)

    ResolveAll:
    1. Call DetectCIToken(). If token is empty, return nil, nil (no auth needed).
    2. For each provider config, call NewProvider then Resolve with the CI token.
    3. Merge all returned env var maps into one (later providers overwrite on key conflict).
    4. If some providers fail but others succeed, log warnings but don't error — return what worked.
    5. If ALL providers fail, return an error.

      var tempFiles []string  // package-level, tracks temp files for cleanup
      func Cleanup()          // removes all tempFiles

