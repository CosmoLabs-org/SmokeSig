    ## hints.go — Exported symbols required:

    type StackHints struct {
        ExpectedPorts   []int
        ExtraProbePaths []string
    }

    func HintsFromDir(dir string) StackHints
    - Reads portless.json from dir. Schema: {"port": int}. If present and port > 0, use as first ExpectedPort.
    - Calls detector.Detect(dir) for []ProjectType.
    - Maps each ProjectType to defaults from stackHints table (see below).
    - Merges: portless port first, then stack defaults (dedup by port number).
    - Returns merged StackHints.

    Unexported helpers:
    func readPortlessPort(dir string) int — reads portless.json, returns port or 0
    func containsInt(s []int, v int) bool

    Stack hint table (var stackHints map[detector.ProjectType]StackHints):
      Go:          ports=[8080], paths=[/metrics, /debug/pprof]
      Node:        ports=[3000], paths=[/api, /graphql]
      Python:      ports=[8000], paths=[/admin, /api]
      ReactNative: ports=[8081], paths=[/status]
      Rust:        ports=[8080], paths=[/api]
      Java:        ports=[8080], paths=[/actuator/health]
      JavaGradle:  ports=[8080], paths=[/actuator/health]
      DotNet:      ports=[5000], paths=[/swagger]
      Ruby:        ports=[3000], paths=[/api]
      PHP:         ports=[8000], paths=[/api]
      Elixir:      ports=[4000], paths=[/api]
      Deno:        ports=[8000], paths=[/api]
      Hugo:        ports=[1313], paths=[/]
      Astro:       ports=[4321], paths=[/]
      Jekyll:      ports=[4000], paths=[/]

    ## hints_test.go — Required tests:

    TestReadPortlessJSON_FlatFormat: write {"port":4650} to temp dir, assert readPortlessPort returns 4650
    TestReadPortlessJSON_AppsFormat_NoPort: write {"apps":...} format, assert returns 0
    TestReadPortlessJSON_Missing: empty dir, assert returns 0
    TestHintsFromDir_PortlessOverridesStack: portless.json + go.mod, assert first port is portless port
    TestHintsFromDir_GoProject: go.mod only, assert port 8080 and /metrics in paths
    TestHintsFromDir_NodeProject: package.json only, assert port 3000
    TestHintsFromDir_EmptyDir: empty dir, assert empty hints
    TestHintsFromDir_PortlessMergesWithStack: portless + go.mod, assert >= 2 ports and paths present

