- task: |
    Add Runner.RunSingle method to internal/runner/runner.go.

    This method finds a test by name in the runner's Config.Tests slice and
    executes it via the existing runTestWithHooks method, returning the result.

    Add this method after the RunMonorepo method (around line 215):

    ```go
    // RunSingle executes a single named test and returns its result.
    // Used by the TUI for re-running individual failures.
    func (r *Runner) RunSingle(name string, opts RunOptions) (*TestResult, error) {
        for _, t := range r.Config.Tests {
            if t.Name == name {
                result := r.runTestWithHooks(t, opts)
                return &result, nil
            }
        }
        return nil, fmt.Errorf("test %q not found", name)
    }
    ```

    Then add tests in internal/runner/runner_test.go. Add a new test function
    after the existing tests:

    ```go
    func TestRunSingle(t *testing.T) {
        cfg := &schema.SmokeConfig{
            Tests: []schema.Test{
                {Name: "echo-test", Command: "echo hello"},
            },
        }
        rep := &reporter.DiscardReporter{}
        r := &Runner{Config: cfg, Reporter: rep, ConfigDir: t.TempDir()}

        // Happy path: known test
        result, err := r.RunSingle("echo-test", RunOptions{})
        if err != nil {
            t.Fatalf("RunSingle returned error: %v", err)
        }
        if !result.Passed {
            t.Errorf("expected test to pass")
        }

        // Error path: unknown test
        _, err = r.RunSingle("nonexistent", RunOptions{})
        if err == nil {
            t.Fatal("expected error for unknown test")
        }
    }
    ```

