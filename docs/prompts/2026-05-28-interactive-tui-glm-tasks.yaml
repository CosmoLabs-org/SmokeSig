    FILE 2: cmd/run_tui.go (//go:build tui)

    ```go
    //go:build tui

    package cmd

    import (
        "fmt"
        "os"

        tea "github.com/charmbracelet/bubbletea"
        "github.com/CosmoLabs-org/SmokeSig/internal/reporter"
        "github.com/CosmoLabs-org/SmokeSig/internal/runner"
        "github.com/CosmoLabs-org/SmokeSig/internal/tui"
    )

    var useTUI bool

    func init() {
        runCmd.Flags().BoolVar(&useTUI, "tui", false, "interactive TUI mode")
    }

    func runWithTUI(rn *runner.Runner, opts runner.RunOptions) error {
        m := tui.NewModel()
        p := tea.NewProgram(m, tea.WithAltScreen())

        rep := tui.NewTUIReporter(p.Send)
        rn.Reporter = rep
        m.SetRerunFunc(func(name string) reporter.TestResultData {
            result, err := rn.RunSingle(name, opts)
            if err != nil {
                return reporter.TestResultData{Name: name, Passed: false, Error: err}
            }
            return reporter.TestResultData{
                Name:           result.Name,
                Passed:         result.Passed,
                Skipped:        result.Skipped,
                AllowedFailure: result.AllowedFailure,
                Duration:       result.Duration,
                Assertions:     toAssertionDetails(result.Assertions),
                Error:          result.Error,
            }
        })

        go func() {
            _, err := rn.Run(opts)
            p.Send(tui.RunnerDoneMsg{Err: err})
        }()

        _, err := p.Run()
        return err
    }

    func toAssertionDetails(results []runner.AssertionResult) []reporter.AssertionDetail {
        details := make([]reporter.AssertionDetail, len(results))
        for i, r := range results {
            details[i] = reporter.AssertionDetail{
                Type:     r.Type,
                Expected: r.Expected,
                Actual:   r.Actual,
                Passed:   r.Passed,
            }
        }
        return details
    }
    ```

