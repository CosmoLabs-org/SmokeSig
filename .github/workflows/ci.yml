# CI for SmokeSig: build, test, self-smoke.
# Runs on every push and PR targeting master.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod  # honours the go directive in go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Install smokesig (self)
        run: go install .

      - name: Self-smoke
        run: smokesig run
