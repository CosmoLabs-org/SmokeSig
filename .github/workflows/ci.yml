# CI for SmokeSig: lint, security scan, build, test, self-smoke.
# Runs on every push and PR targeting master.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for --new-from-rev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Gradual adoption: only flag issues introduced in the current PR/push.
          args: --new-from-rev=HEAD~1 --timeout=5m

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude=G204,G104 -exclude-dir=*_test.go ./...

  ci:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Install smokesig (self)
        run: go install .

      - name: Self-smoke
        run: smokesig run
